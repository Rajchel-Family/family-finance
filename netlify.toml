[build]
  publish   = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[dev]
  port       = 8888
  autoLaunch = false
